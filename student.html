<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章朗讀練習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f172a;
    --card: #1e293b;
    --teal: #14b8a6;
    --sky: #38bdf8;
    --yellow: #fbbf24;
    --green: #4ade80;
    --white: #f8fafc;
    --muted: #94a3b8;
    --orange: #fb923c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--navy);
    font-family: 'Noto Sans TC', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    position: relative;
    overflow: hidden;
  }

  /* Blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: bfloat 9s ease-in-out infinite;
    pointer-events: none;
  }
  .b1 { width: 420px; height: 420px; background: var(--teal); top: -120px; left: -100px; }
  .b2 { width: 360px; height: 360px; background: var(--sky); bottom: -100px; right: -80px; animation-delay: 3s; }
  .b3 { width: 220px; height: 220px; background: var(--yellow); top: 40%; left: 55%; animation-delay: 1.5s; }
  @keyframes bfloat {
    0%,100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-28px) scale(1.06); }
  }

  /* Card */
  .card {
    position: relative;
    background: var(--card);
    border-radius: 28px;
    padding: 40px 32px 36px;
    max-width: 360px;
    width: 100%;
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    text-align: center;
    animation: slideUp 0.65s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes slideUp {
    from { opacity:0; transform: translateY(40px) scale(0.95); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  /* Badge */
  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--teal), var(--sky));
    color: var(--navy);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 99px;
    margin-bottom: 22px;
  }

  /* Avatar */
  .avatar {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--teal), var(--sky));
    display: flex; align-items: center; justify-content: center;
    font-size: 42px;
    margin: 0 auto 18px;
    box-shadow: 0 8px 28px rgba(20,184,166,0.35);
    animation: pulse 2.2s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(20,184,166,0.45); }
    70%  { box-shadow: 0 0 0 18px rgba(20,184,166,0); }
    100% { box-shadow: 0 0 0 0 rgba(20,184,166,0); }
  }

  .name {
    font-family: 'Nunito', 'Noto Sans TC', sans-serif;
    font-size: 38px;
    font-weight: 900;
    color: var(--white);
    margin-bottom: 4px;
  }

  .chips {
    display: flex; gap: 8px; justify-content: center;
    margin: 14px 0 28px; flex-wrap: wrap;
  }
  .chip {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--white);
    border-radius: 99px;
    padding: 6px 16px;
    font-size: 14px; font-weight: 700;
  }
  .chip em { color: var(--sky); font-style: normal; margin-right: 3px; }

  .divider { height:1px; background: rgba(255,255,255,0.06); margin: 0 0 24px; }

  /* Main CTA */
  .btn-go {
    display: block; width: 100%;
    padding: 17px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--teal), var(--sky));
    color: var(--navy);
    font-size: 16px; font-weight: 900;
    text-decoration: none;
    box-shadow: 0 8px 24px rgba(56,189,248,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer; border: none;
    font-family: 'Noto Sans TC', sans-serif;
    margin-bottom: 12px;
  }
  .btn-go:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(56,189,248,0.45); }
  .btn-go:active { transform: scale(0.98); }

  /* Done button */
  .btn-done {
    display: block; width: 100%;
    padding: 17px;
    border-radius: 14px;
    background: rgba(74,222,128,0.12);
    color: var(--green);
    font-size: 16px; font-weight: 900;
    border: 1.5px solid rgba(74,222,128,0.3);
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-done:hover { background: rgba(74,222,128,0.22); transform: translateY(-1px); }
  .btn-done:active { transform: scale(0.98); }
  .btn-done:disabled {
    opacity: 0.5; cursor: not-allowed; transform: none;
  }

  /* ── 成績輸入區 ── */
  .score-box {
    display: none;
    margin-top: 16px;
    background: rgba(251,146,60,0.08);
    border: 1.5px solid rgba(251,146,60,0.3);
    border-radius: 16px;
    padding: 20px 18px;
    animation: fadeIn 0.35s ease both;
  }
  .score-label {
    font-size: 13px; font-weight: 700;
    color: var(--orange); margin-bottom: 12px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .score-input-row {
    display: flex; gap: 10px; align-items: center;
  }
  .score-input {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    color: var(--white);
    font-size: 28px; font-weight: 900;
    font-family: 'Nunito', 'Noto Sans TC', sans-serif;
    text-align: center;
    padding: 12px 8px;
    outline: none;
    transition: border 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }
  .score-input::-webkit-outer-spin-button,
  .score-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .score-input:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(251,146,60,0.2);
  }
  .score-input::placeholder { color: rgba(255,255,255,0.2); font-size: 18px; }

  .btn-submit-score {
    padding: 14px 18px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--orange), var(--yellow));
    color: var(--navy); font-size: 15px; font-weight: 900;
    border: none; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(251,146,60,0.35);
    white-space: nowrap;
  }
  .btn-submit-score:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(251,146,60,0.45); }
  .btn-submit-score:active { transform: scale(0.97); }
  .btn-submit-score:disabled { opacity:0.5;cursor:not-allowed;transform:none; }

  .score-hint {
    font-size: 11px; color: var(--muted);
    margin-top: 8px; text-align: center;
  }

  /* Countdown */
  .countdown {
    margin-top: 18px;
    font-size: 12px;
    color: var(--muted);
  }
  #timer { color: var(--yellow); font-weight: 900; font-size: 14px; }

  /* Success overlay */
  .success-box {
    display: none;
    background: rgba(74,222,128,0.1);
    border: 1.5px solid rgba(74,222,128,0.35);
    border-radius: 14px;
    padding: 20px 18px;
    text-align: center;
    margin-top: 12px;
    animation: fadeIn 0.4s ease both;
  }
  .success-box .s-icon { font-size: 36px; }
  .success-box .s-text { color: var(--green); font-weight: 700; font-size: 16px; margin-top: 8px; }
  .success-box .s-sub  { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .score-badge {
    display: inline-block;
    margin-top: 12px;
    background: linear-gradient(135deg, var(--orange), var(--yellow));
    color: var(--navy);
    font-family: 'Nunito','Noto Sans TC',sans-serif;
    font-size: 32px; font-weight: 900;
    padding: 6px 22px; border-radius: 99px;
  }
  .score-badge-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  @keyframes fadeIn {
    from { opacity:0; transform: scale(0.95); }
    to   { opacity:1; transform: scale(1); }
  }

  /* Error state */
  #error-box {
    display: none;
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
  }
  #error-box .e-icon { font-size: 48px; margin-bottom: 12px; }
  #error-box p { font-size: 14px; line-height: 1.8; }
</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="card" id="main-card">
  <!-- Error state (if no params) -->
  <div id="error-box">
    <div class="e-icon">🔍</div>
    <p>找不到學生資料。<br>請使用老師提供的 QR Code 掃描開啟。</p>
  </div>

  <!-- Student info (shown when params exist) -->
  <div id="student-box" style="display:none">
    <div class="badge">🎤 文章朗讀練習</div>
    <div class="avatar">🧑‍🎓</div>
    <div class="name" id="s-name"></div>
    <div class="chips">
      <div class="chip"><em>🏫</em><span id="s-class"></span></div>
      <div class="chip"><em>#</em><span id="s-num"></span>號</div>
    </div>
    <div class="divider"></div>

    <a class="btn-go" id="go-btn" href="#" target="_blank">🚀 開始朗讀練習</a>
    <button class="btn-done" id="done-btn" onclick="showScoreInput()">✅ 我完成了！</button>

    <!-- 成績輸入區（按完成後出現） -->
    <div class="score-box" id="score-box">
      <div class="score-label">🏆 輸入這次的最佳成績</div>
      <div class="score-input-row">
        <input
          type="number" id="score-input"
          class="score-input" min="0" max="100"
          placeholder="0–100"
          inputmode="numeric"
        />
        <button class="btn-submit-score" id="submit-btn" onclick="reportDone()">送出 🎯</button>
      </div>
      <div class="score-hint">請看 Jutor 畫面上的分數再填寫</div>
    </div>

    <!-- 完成成功畫面 -->
    <div class="success-box" id="success-box">
      <div class="s-icon">🎉</div>
      <div class="s-text">太棒了！紀錄已送出！</div>
      <div class="score-badge" id="success-score"></div>
      <div class="score-badge-label">本次最佳成績</div>
      <div class="s-sub" id="success-time"></div>
    </div>

    <div class="countdown" id="countdown-wrap">
      <span id="timer">5</span> 秒後自動開啟練習頁
    </div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const cls  = params.get('class') || '';
  const num  = params.get('num')   || '';
  const name = params.get('name')  || '';

  // 👇 請換成你的 Google Apps Script 部署網址
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbyeGER899Q6vZFkmTyZKiofesPoTg0nGioGjov0y8raINLH42U6b8IsZRVPVu0krqD6/exec';

  if (!cls || !num || !name) {
    document.getElementById('error-box').style.display = 'block';
  } else {
    document.getElementById('student-box').style.display = 'block';
    document.getElementById('s-name').textContent  = name;
    document.getElementById('s-class').textContent = cls;
    document.getElementById('s-num').textContent   = num;

    const jutorUrl = 'https://www.jutor.ai/event/speak/passage/index.html';
    document.getElementById('go-btn').href = jutorUrl;

    // 倒數自動跳轉
    let t = 5;
    const timerEl  = document.getElementById('timer');
    const interval = setInterval(() => {
      t--;
      timerEl.textContent = t;
      if (t <= 0) {
        clearInterval(interval);
        document.getElementById('countdown-wrap').style.display = 'none';
        window.open(jutorUrl, '_blank');
      }
    }, 1000);

    document.getElementById('go-btn').addEventListener('click', () => {
      clearInterval(interval);
      document.getElementById('countdown-wrap').style.display = 'none';
    });
  }

  // 按「我完成了」→ 顯示成績輸入框
  function showScoreInput() {
    document.getElementById('done-btn').style.display = 'none';
    const box = document.getElementById('score-box');
    box.style.display = 'block';
    setTimeout(() => document.getElementById('score-input').focus(), 300);
  }

  // 送出成績 + 完成回報
  async function reportDone() {
    const scoreVal = document.getElementById('score-input').value.trim();
    const score    = scoreVal === '' ? '未填寫' : scoreVal;

    // 驗證範圍
    if (scoreVal !== '' && (isNaN(scoreVal) || +scoreVal < 0 || +scoreVal > 100)) {
      const inp = document.getElementById('score-input');
      inp.style.borderColor = '#f87171';
      inp.focus();
      return;
    }

    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = '⏳ 送出中...';

    const now = new Date();
    const timeStr = now.toLocaleString('zh-TW', {
      year:'numeric', month:'2-digit', day:'2-digit',
      hour:'2-digit', minute:'2-digit', second:'2-digit',
      hour12: false
    });

    // 傳送到 Google Sheet
    if (GAS_URL && GAS_URL !== 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
      try {
        await fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            class: cls, num, name,
            score,
            time: timeStr,
            task: '文章朗讀'
          })
        });
      } catch(e) {
        console.warn('回報失敗', e);
      }
    }

    // 隱藏輸入區，顯示成功
    document.getElementById('score-box').style.display = 'none';
    const successBox = document.getElementById('success-box');
    successBox.style.display = 'block';
    document.getElementById('success-score').textContent =
      scoreVal === '' ? '—' : scoreVal + ' 分';
    document.getElementById('success-time').textContent = `完成時間：${timeStr}`;
  }
</script>
</body>
</html>
